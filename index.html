<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Registro Minibasket iOS</title>
<style>
/* TEMA VERDE SMERALDO OTTIMIZZATO IPHONE */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #50C878; color: white; margin: 0; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
}
h1 { text-align: center; font-size: 1.4rem; margin: 15px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
.card {
    background: white; color: #333; padding: 15px; margin: 10px 0;
    border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
label { font-weight: 700; display: block; margin: 10px 0 5px 0; font-size: 0.85rem; color: #444; }
select, input {
    width: 100%; padding: 12px; border: 1px solid #ccc;
    border-radius: 10px; font-size: 16px; background: #fff;
    -webkit-appearance: none; 
}
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f8f9fa; color: #666; font-size: 0.75rem; text-transform: uppercase; }

/* STATI ATLETI */
.atleta-row { -webkit-user-select: none; user-select: none; }
.atleta-row.presente { background: #eaffef; font-weight: bold; color: #1b5e20; }
.check-mark { font-size: 1.2rem; color: #ddd; }
.presente .check-mark { color: #50C878; }

/* BOTTONI IPHONE STYLE */
.btn {
    display: flex; align-items: center; justify-content: center;
    padding: 14px; border: none; border-radius: 12px;
    font-weight: 700; color: white; text-align: center;
    font-size: 13px; margin: 5px 0; width: 100%; text-transform: uppercase;
}
.btn:active { opacity: 0.7; transform: scale(0.98); }
.btn-save { background: #2e7d32; }
.btn-print { background: #007bff; }
.btn-reset { background: #d32f2f; }
.btn-history { background: #17a2b8; }
.btn-backup { background: #673ab7; }
.btn-stats { background: #ff9800; }

#anteprimaBox {
    background: #f1f3f4; padding: 12px; border-radius: 10px;
    margin-top: 10px; border: 1px solid #ddd; font-family: "Courier New", monospace;
    font-size: 0.85rem; color: #333; white-space: pre-wrap;
    word-break: break-word;
}

#statsResult { margin-top: 15px; border-top: 2px solid #ff9800; padding-top: 10px; display: none; }
.ranking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.badge { background: #ff9800; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }

@media print {
    .no-print { display: none !important; }
    body { background: white !important; color: black !important; padding: 0; }
    .card { box-shadow: none; border: none; width: 100%; padding: 0; }
    .atleta-row:not(.presente) { display: none !important; }
    .print-header { display: block !important; text-align: center; }
}
.print-header { display: none; }
</style>
</head>
<body>

<h1>🏀 REGISTRO PRESENZE VALL'IPPARI BASKET</h1>

<div class="card no-print">
    <div style="display:flex; gap:8px;">
        <button class="btn btn-backup" id="btnExport">Backup</button>
        <button class="btn" style="background:#546e7a" id="btnFakeImport">Importa</button>
    </div>
    <input type="file" id="importFile" style="visibility:hidden; width:0; height:0;" accept=".json">

    <div style="margin-top:12px; border-top:1px solid #eee; padding-top:10px;">
        <label>CARICA DATA PASSATA</label>
        <div style="display:flex; gap:5px;">
            <input type="date" id="dataStorico">
            <button class="btn btn-history" id="btnCaricaStorico" style="width:90px; margin:0">VAI</button>
        </div>
    </div>
</div>

<div class="card no-print">
    <label>DATA ODIERNA</label>
    <input type="date" id="dataAllenamento">
    <label>GRUPPO</label>
    <select id="filtroCat">
        <option value="tutti">Tutti</option>
        <option value="pulcini">PULCINI (2018-19)</option>
        <option value="scoiattoli">SCOIATTOLI (2016-17)</option>
        <option value="aquilotti">AQUILOTTI (2014-15)</option>
    </select>
</div>

<div class="card">
    <div class="print-header">
        <h2 style="margin:0">ASD VALL'IPPARI VITTORIA BASKET</h2>
        <p id="dataStampaHeader" style="font-weight:bold;"></p>
        <hr>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:60%">Atleta</th>
                <th style="width:20%">Anno</th>
                <th class="no-print" style="width:20%; text-align:center">Ok</th>
            </tr>
        </thead>
        <tbody id="atletiBody"></tbody>
    </table>

    <div class="no-print" style="margin-top:20px;">
        <label>ANTEPRIMA WHATSAPP</label>
        <div id="anteprimaBox">Tocca un nome per iniziare...</div>
    </div>

    <div class="no-print" style="margin-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <button class="btn btn-save" id="btnSalva">SALVA</button>
        <button class="btn btn-print" onclick="preparaStampa()">STAMPA</button>
        <button class="btn btn-reset" id="btnReset" style="grid-column: span 2;">RESET LISTA</button>
    </div>
</div>

<div class="card no-print">
    <h2 style="margin:0; font-size: 1.1rem; color:#ff9800;">📊 STATISTICHE MENSILI</h2>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <input type="month" id="meseStats">
        <button class="btn btn-stats" id="btnCalcolaStats" style="width:110px; margin:0">VEDI</button>
    </div>
    <div id="statsResult">
        <div id="totAllenamentiMese" style="font-weight:bold; margin-bottom:10px; color:#e65100;"></div>
        <div id="listaRanking"></div>
    </div>
</div>

<script>
// ELENCO AGGIORNATO CON VASILE GIOVANNI E DIANO FRANCESCO
const atleti = [
    {n:'Cirnigliaro Lorenzo', a:2019}, {n:'Lo Cicero Francesco', a:2019},
    {n:'Bulcassimo Raffaele', a:2018}, {n:'Cilio Nicoló Savio', a:2018},
    {n:'Di Martino Sergio', a:2018}, {n:'Menesino Sergio', a:2018},
    {n:'Romano Edoardo', a:2018}, {n:'Cassarino Nicoló', a:2017},
    {n:'Di Martino Matteo', a:2017}, {n:'Giudice Lorenzo', a:2017},
    {n:'Guastella Tommaso', a:2017}, {n:'Mazza Giovanni', a:2017},
    {n:'Paternò Sergio', a:2017}, {n:'Sesto Lorenzo', a:2017},
    {n:'Stimolo Federico', a:2017}, {n:'Arestia Carmelo', a:2016},
    {n:'Baeli Giulio', a:2016}, {n:'Bertolone Matteo', a:2016},
    {n:'Brugoletta Nicoló Maria', a:2016}, {n:'Cilio Angelo', a:2016},
    {n:"D'Agosta Gaetano", a:2016}, {n:'Incardona Luca', a:2016},
    {n:'Diano Francesco', a:2014},
    {n:'Di Natate Gabriele', a:2014}, 
    {n:'Battaglia Lorenzo', a:2015}, {n:'Campagnolo Francesco', a:2015},
    {n:'Cassarino Vincenzo', a:2015}, {n:'La Rosa Matteo', a:2015},
    {n:'Lorefice Thomas', a:2015}, {n:'Occhipinti Nathan Rosario', a:2015},
    {n:'Ribaldo Gabriele Maria', a:2015}, {n:'Antoci Leonardo', a:2014},
    {n:'Blanco Alessio', a:2014}, {n:'Gurrieri Raffael Emanuel', a:2014},
    {n:'Longombardo Matteo', a:2014}, {n:'Puglisi Marco', a:2014},
    {n:'Rotante Leonardo', a:2014}, {n:'Sbezzo Andrea', a:2014},
    {n:'Scifo Andrea', a:2014}, {n:'Siciliano Mattia', a:2014},
    {n:'Vasile Giovanni', a:2014}
].sort((a, b) => a.n.localeCompare(b.n));

let presenze = new Set();
const DB_KEY = 'vbasket_safari_v1';

const ora = new Date();
document.getElementById('dataAllenamento').valueAsDate = ora;
document.getElementById('dataStorico').valueAsDate = ora;
document.getElementById('meseStats').value = ora.toISOString().slice(0, 7);

function render() {
    const tbody = document.getElementById('atletiBody');
    tbody.innerHTML = '';
    const f = document.getElementById('filtroCat').value;

    atleti.forEach(atleta => {
        let ok = (f==='tutti') ||
                 (f==='pulcini' && [2018,2019].includes(atleta.a)) ||
                 (f==='scoiattoli' && [2016,2017].includes(atleta.a)) ||
                 (f==='aquilotti' && [2014,2015].includes(atleta.a));

        if(ok) {
            const tr = document.createElement('tr');
            tr.className = 'atleta-row' + (presenze.has(atleta.n) ? ' presente' : '');
            tr.innerHTML = `
                <td>${atleta.n}</td>
                <td>${atleta.a}</td>
                <td class="no-print" style="text-align:center"><span class="check-mark">${presenze.has(atleta.n) ? '●' : '○'}</span></td>
            `;
            tr.onclick = (e) => {
                e.preventDefault();
                if(presenze.has(atleta.n)) presenze.delete(atleta.n);
                else presenze.add(atleta.n);
                aggiornaAnteprima();
            };
            tbody.appendChild(tr);
        }
    });
}

function aggiornaAnteprima() {
    render();
    const arr = Array.from(presenze).sort();
    const box = document.getElementById('anteprimaBox');
    if(arr.length > 0) {
        box.innerText = `*PRESENTI ${document.getElementById('dataAllenamento').value}*\nTotale: ${arr.length}\n----------\n- ` + arr.join('\n- ');
    } else {
        box.innerText = "Tocca un nome per iniziare...";
    }
}

document.getElementById('btnFakeImport').onclick = () => document.getElementById('importFile').click();

document.getElementById('btnCaricaStorico').onclick = () => {
    const data = document.getElementById('dataStorico').value;
    const reg = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    if (reg[data]) {
        presenze = new Set(reg[data]);
        document.getElementById('dataAllenamento').value = data;
        aggiornaAnteprima();
    } else alert("Dati non trovati");
};

document.getElementById('btnCalcolaStats').onclick = () => {
    const mese = document.getElementById('meseStats').value;
    const reg = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    const conteggio = {};
    let sessioni = 0;
    atleti.forEach(a => conteggio[a.n] = 0);
    for (const [d, lista] of Object.entries(reg)) {
        if (d.startsWith(mese)) {
            sessioni++;
            lista.forEach(n => { if(conteggio[n] !== undefined) conteggio[n]++; });
        }
    }
    const res = Object.entries(conteggio).filter(i => i[1] > 0).sort((a,b) => b[1]-a[1]);
    document.getElementById('statsResult').style.display = 'block';
    document.getElementById('totAllenamentiMese').innerText = `SESSIONI TOTALI: ${sessioni}`;
    document.getElementById('listaRanking').innerHTML = res.map(i => `
        <div class="ranking-item"><span>${i[0]}</span><span class="badge">${i[1]} / ${sessioni}</span></div>
    `).join('');
};

function preparaStampa() {
    document.getElementById('dataStampaHeader').innerText = "REGISTRO: " + document.getElementById('dataAllenamento').value;
    window.print();
}

document.getElementById('btnSalva').onclick = () => {
    const reg = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    reg[document.getElementById('dataAllenamento').value] = Array.from(presenze);
    localStorage.setItem(DB_KEY, JSON.stringify(reg));
    alert("Salvato correttamente!");
};

document.getElementById('btnReset').onclick = () => {
    if(confirm("Svuotare la lista attuale?")) { presenze.clear(); aggiornaAnteprima(); }
};

document.getElementById('btnExport').onclick = () => {
    const data = localStorage.getItem(DB_KEY) || '{}';
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_basket.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
};

document.getElementById('importFile').onchange = (e) => {
    const r = new FileReader();
    r.onload = (ev) => { localStorage.setItem(DB_KEY, ev.target.result); location.reload(); };
    r.readAsText(e.target.files[0]);
};

document.getElementById('filtroCat').onchange = render;
render();
</script>
</body>
</html>
